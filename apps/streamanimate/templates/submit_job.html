<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Submit Animate Generation</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎬</text></svg>">

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <!-- DataTables CSS & JS with Bootstrap 5 integration -->
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>

    <!-- AnsiUp for colored terminal output -->
    <script src="https://cdn.jsdelivr.net/npm/ansi_up@5.0.0/ansi_up.min.js"></script>
    <script>const ansiUp = new AnsiUp();</script>

    <!-- Bootstrap 5.3.5 Bundle JS (includes Popper) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    <script src="{{ url_for('static', filename='js/form-utils.js') }}"></script>
</head>

<body class="bg-light">
    <div class="fixed-nav-buttons">
        <a class="btn btn-outline-primary" href="/" title="Home" aria-label="Home">🏠</a>
    </div>

    <div class="container py-4">
        <h1>🚀 Submit Animate Generation</h1>

        <div class="card shadow-sm mb-4">
            <div class="card-body">
                <form id="job-form">
                    <h4>🎨 Animation Subject</h4>
                    <div class="mb-3">
                        <label for="text_prompt" class="form-label">
                            Text Description
                            <span class="text-muted" data-bs-toggle="tooltip"
                                title="Describe what to animate. Used to generate an image if none is uploaded.">ℹ️</span>
                        </label>
                        <textarea class="form-control" id="text_prompt" name="text_prompt" rows="3"
                            placeholder="e.g. A majestic eagle soaring over snow-capped mountains at sunset."></textarea>
                    </div>

                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <label for="upload_image" class="form-label">
                                Upload Image (optional)
                                <span class="text-muted" data-bs-toggle="tooltip"
                                    title="Upload a source image to animate. If omitted, an image is generated from the text description.">ℹ️</span>
                            </label>
                            <input type="file" class="form-control" id="upload_image" name="upload_image"
                                accept="image/png,image/jpeg,image/webp">
                        </div>
                    </div>

                    <h4>🔉 Narration (optional)</h4>
                    <div class="mb-3">
                        <label for="narration_text" class="form-label">
                            Narration text
                            <span class="text-muted" data-bs-toggle="tooltip"
                                title="Optional voiceover to play alongside the animation.">ℹ️</span>
                        </label>
                        <textarea class="form-control" id="narration_text" name="narration_text" rows="2"
                            placeholder="Optional: enter narration text to add a voiceover to the animation."></textarea>
                    </div>

                    <!-- Advanced Settings (collapsed by default) -->
                    <div class="mb-3 text-end">
                        <button class="btn btn-outline-secondary btn-sm" type="button"
                                data-bs-toggle="collapse" data-bs-target="#advanced-settings"
                                aria-expanded="false" aria-controls="advanced-settings"
                                title="Advanced Settings">
                            ⚙️
                        </button>
                    </div>

                    <div class="collapse" id="advanced-settings">

                    <h4>📽️ Output</h4>
                    <div class="row g-3 mb-3">
                        <div class="col-md-4">
                            <label for="output_mode" class="form-label">🎚️ Mode</label>
                            <select class="form-select" id="output_mode" name="output_mode">
                                <option value="video_audio_synced">🔉🗣️ Video + Audio (synced)</option>
                                <option value="video_audio_unsynced">📽️🔉 Video + Audio (unsynced)</option>
                                <option value="audio_only">🔉 Audio Only</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label for="resolution" class="form-label">🖥️ Resolution</label>
                            <select class="form-select" id="resolution" name="resolution">
                                <option value="high">⬆️ High (1280x800)</option>
                                <option value="medium">↗️ Medium (640x400)</option>
                                <option value="low">⬇️ Low (320x200)</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label for="quality" class="form-label">🌟 Quality</label>
                            <select class="form-select" id="quality" name="quality">
                                <option value="high">⬆️ High</option>
                                <option value="medium">↗️ Medium</option>
                                <option value="low">⬇️ Low</option>
                            </select>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="video_duration_seconds" class="form-label">
                            ⏱️ Duration: <span id="duration_value">5</span> seconds
                        </label>
                        <input type="range" class="form-range"
                            id="video_duration_seconds" name="video_duration_seconds"
                            value="5" min="2" max="30" step="1"
                            oninput="document.getElementById('duration_value').textContent = this.value; updateGenerationTime();">
                    </div>

                    <div class="mb-3">
                        <label for="speech_speed" class="form-label">
                            🎙️ Speech speed: <span id="speech_speed_value">1.1</span>x
                        </label>
                        <input type="range" class="form-range"
                            id="speech_speed" name="speech_speed"
                            value="1.1" min="0.5" max="2.0" step="0.1"
                            oninput="document.getElementById('speech_speed_value').textContent = this.value">
                    </div>

                    <!-- Checkboxes -->
                    <div class="row g-3 mb-3">
                        <div class="col-md-3">
                            <div class="form-check">
                                <input type="checkbox" class="form-check-input" id="debug_image" name="debug_image" value="1">
                                <label for="debug_image" class="form-check-label">
                                    🧑‍💻 Debug
                                    <span class="text-muted" data-bs-toggle="tooltip" title="Add debugging information to the video.">ℹ️</span>
                                </label>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="form-check">
                                <input type="checkbox" class="form-check-input" id="upscaling" name="upscaling" value="1" checked>
                                <label for="upscaling" class="form-check-label">
                                    🖼️⬆️ Upscale
                                    <span class="text-muted" data-bs-toggle="tooltip" title="Generate at lower resolution then upscale.">ℹ️</span>
                                </label>
                            </div>
                        </div>
                    </div>

                    </div><!-- end #advanced-settings -->

                    <!-- Estimate + submit -->
                    <div class="mb-3">
                        <strong>⏳ Estimated generation time:</strong> <span id="generation_time_estimate">~45 seconds</span>
                    </div>

                    <div class="text-center">
                        <button
                            type="submit"
                            class="btn btn-success btn-lg"
                            style="width: 200px;">
                            🚀 Submit
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Output -->
        <div id="output-card" class="card shadow-sm" style="display: none;">
            <div class="card-body">
                <h5 class="card-title">Response</h5>
                <pre id="output" class="bg-dark text-white p-3 rounded" style="height: 300px; overflow: auto;"></pre>
            </div>
        </div>
    </div>

    <script>
        function estimateGenerationTime() {
            const videoDuration = parseInt(document.getElementById("video_duration_seconds").value);
            const outputMode = document.getElementById("output_mode").value;
            let estimatedTime = 15;
            if (outputMode === "audio_only") {
                estimatedTime = 15;
            } else if (outputMode === "video_audio_synced") {
                estimatedTime = Math.round(2200.0 * (videoDuration / 60.0));
            } else {
                estimatedTime = Math.round(1800.0 * (videoDuration / 60.0));
            }
            estimatedTime = Math.max(estimatedTime, 15);
            return formatStringTime(estimatedTime);
        }

        function updateGenerationTime() {
            document.getElementById("generation_time_estimate").textContent = "~" + estimateGenerationTime();
        }

        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById("output_mode").addEventListener("change", updateGenerationTime);
            updateGenerationTime();
        });

        document.getElementById("job-form").addEventListener("submit", async function (event) {
            event.preventDefault();

            const payload = {};

            // Text prompt
            const textPrompt = document.getElementById("text_prompt").value.trim();
            const narrationText = document.getElementById("narration_text").value.trim();
            const imageInput = document.getElementById("upload_image");

            if (!textPrompt && !imageInput.files.length) {
                alert("Please provide a text description or upload an image.");
                return;
            }

            if (textPrompt) {
                payload.text_prompt = textPrompt;
            }

            if (narrationText) {
                payload.narration_text = narrationText;
            }

            // Optional image upload
            if (imageInput.files.length) {
                const imageFile = imageInput.files[0];
                const MAX_FILE_SIZE_MB = 16;
                const MAX_FILE_SIZE = MAX_FILE_SIZE_MB * 1024 * 1024;
                if (imageFile.size > MAX_FILE_SIZE) {
                    alert(
                        `File too large (${(imageFile.size / 1024 / 1024).toFixed(1)} MB).\n` +
                        `Maximum allowed size is ${MAX_FILE_SIZE_MB} MB.`
                    );
                    return;
                }
                payload.image_base64 = await fileToBase64(imageFile);
            }

            // Output settings
            payload.output_mode = document.getElementById("output_mode").value;
            payload.resolution = document.getElementById("resolution").value;
            payload.quality = document.getElementById("quality").value;
            payload.video_duration_seconds = parseFloat(document.getElementById("video_duration_seconds").value);
            payload.speech_speed = parseFloat(document.getElementById("speech_speed").value);

            // Flags
            payload.debug_image = document.getElementById("debug_image").checked;
            payload.upscaling = document.getElementById("upscaling").checked;

            const output = document.getElementById("output");
            try {
                const response = await fetch("/api/job", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });
                const contentType = response.headers.get("Content-Type") || "";
                if (contentType.includes("application/json")) {
                    const data = await response.json();
                    let formatted = `<pre class="text-white">${JSON.stringify(data, null, 2)}</pre>`;
                    if (data.job_id) {
                        window.location.href = `/job/${data.job_id}`;
                    }
                    output.innerHTML = formatted;
                } else {
                    const text = await response.text();
                    output.textContent = `Unexpected content-type: ${contentType}\n\n${text}`;
                }
                document.getElementById("output-card").style.display = "block";
            } catch (err) {
                output.textContent = "❌ Error: " + err.message;
            }
        });
    </script>
</body>
</html>
