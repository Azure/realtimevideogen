[mypy]
python_version = 3.12
ignore_missing_imports = False
warn_unused_ignores = True
disallow_untyped_defs = True
exclude = /site-packages/

# Wrapper files and media_utils use ML/media packages (diffusers, torch, imageio)
# whose type stubs are incomplete. type: ignore comments may only be needed in CI.
[mypy-wrapper.*]
warn_unused_ignores = False

[mypy-media_utils]
warn_unused_ignores = False
