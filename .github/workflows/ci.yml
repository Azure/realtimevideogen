name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: ['*']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: write
  pages: write
  id-token: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5

    - name: Use Python 3.12
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install flake8 j2lint

    - name: Install shellcheck
      run: |
        sudo apt-get update
        sudo apt-get install -y shellcheck
        sudo apt-get clean
        sudo rm -rf /var/lib/apt/lists/*

    - name: Run Python lint
      if: always()
      run: flake8 . tests --output-file=flake8-results.txt --tee

    - name: Annotate flake8 results
      if: always()
      uses: reviewdog/action-setup@v1

    - name: Flake8 reviewdog
      if: always()
      env:
        REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        cat flake8-results.txt | reviewdog -efm="%f:%l:%c: %m" -name="flake8" -reporter=github-check -level=warning || true

    - name: Run shell lint
      if: always()
      run: |
        shellcheck -f gcc $(git ls-files '*.sh') $(git ls-files '*.bash') > shellcheck-results.txt 2>&1 || true
        cat shellcheck-results.txt

    - name: Shellcheck reviewdog
      if: always()
      env:
        REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        cat shellcheck-results.txt | reviewdog -efm="%f:%l:%c: %m" -name="shellcheck" -reporter=github-check -level=warning || true

    - name: Run HTML/Jinja lint
      if: always()
      run: |
        j2lint streamwise/templates/ --extensions html || true
        j2lint apps/streamcast/templates/ --extensions html || true
        j2lint apps/streampersona/templates/ --extensions html || true
        j2lint apps/streamshort/templates/ --extensions html || true
        j2lint apps/streamdub/templates/ --extensions html || true
        j2lint apps/streammovie/templates/ --extensions html || true
        j2lint apps/streamedit/templates/ --extensions html || true
        j2lint apps/streamchat/templates/ --extensions html || true
        j2lint apps/streamlecture/templates/ --extensions html || true
        j2lint apps/streamanimate/templates/ --extensions html || true

    - name: Lint summary
      if: always()
      run: |
        echo "## Lint Results" >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"
        if [ -s flake8-results.txt ]; then
          FLAKE8_COUNT=$(wc -l < flake8-results.txt)
          echo "**flake8:** ${FLAKE8_COUNT} issue(s)" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          head -20 flake8-results.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
        else
          echo "**flake8:** No issues found :white_check_mark:" >> "$GITHUB_STEP_SUMMARY"
        fi
        echo "" >> "$GITHUB_STEP_SUMMARY"
        if [ -s shellcheck-results.txt ]; then
          SC_COUNT=$(wc -l < shellcheck-results.txt)
          echo "**shellcheck:** ${SC_COUNT} issue(s)" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          head -20 shellcheck-results.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
        else
          echo "**shellcheck:** No issues found :white_check_mark:" >> "$GITHUB_STEP_SUMMARY"
        fi

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - uses: actions/checkout@v5

    - name: Use Python 3.12
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '10.x'

    - name: Install ffmpeg
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg
        ffmpeg -version
        dpkg -s ffmpeg
        sudo apt-get clean
        sudo rm -rf /var/lib/apt/lists/*

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install -r requirements_dev.txt

    - name: Run Python type checking
      if: always()
      shell: bash {0}
      run: |
        mypy --install-types --non-interactive --show-traceback --ignore-missing-imports . || true
        mypy --ignore-missing-imports . || true

    - name: 'Run tests: Main'
      if: always()
      timeout-minutes: 10
      run: |
        export COVERAGE_FILE=.coverage.main
        pytest --junitxml=test-results-main.xml \
              --cov=. \
              --cov-report=term \
              --durations=10 \
              -vv \
              --ignore=tests/simulator \
              --ignore=tests/streamwise \
              --ignore=tests/streamwise_app

    - name: 'Run tests: Simulator'
      if: always()
      timeout-minutes: 10
      run: |
        export COVERAGE_FILE=.coverage.simulator
        pytest --junitxml=test-results-simulator.xml \
              --cov=. \
              --cov-report=term \
              --durations=10 \
              -vv \
              tests/simulator/*.py

    - name: 'Run tests: StreamCast'
      if: always()
      timeout-minutes: 10
      run: |
        export COVERAGE_FILE=.coverage.streamcast
        pytest --junitxml=test-results-streamcast.xml \
              --cov=. \
              --cov-report=term \
              --durations=10 \
              -vv \
              tests/streamwise_app/test_streamcast.py

    - name: 'Run tests: StreamPersona'
      if: always()
      timeout-minutes: 10
      run: |
        export COVERAGE_FILE=.coverage.streampersona
        pytest --junitxml=test-results-streampersona.xml \
              --cov=. \
              --cov-report=term \
              --durations=10 \
              -vv \
              tests/streamwise_app/test_streampersona.py

    - name: 'Run tests: StreamShort'
      if: always()
      timeout-minutes: 10
      run: |
        export COVERAGE_FILE=.coverage.streamshort
        pytest --junitxml=test-results-streamshort.xml \
              --cov=. \
              --cov-report=term \
              --durations=10 \
              -vv \
              tests/streamwise_app/test_streamshort.py

    - name: 'Run tests: StreamDub'
      if: always()
      timeout-minutes: 10
      run: |
        export COVERAGE_FILE=.coverage.streamdub
        pytest --junitxml=test-results-streamdub.xml \
              --cov=. \
              --cov-report=term \
              --durations=10 \
              -vv \
              tests/streamwise_app/test_streamdub.py

    - name: 'Run tests: StreamMovie'
      if: always()
      timeout-minutes: 10
      run: |
        export COVERAGE_FILE=.coverage.streammovie
        pytest --junitxml=test-results-streammovie.xml \
              --cov=. \
              --cov-report=term \
              --durations=10 \
              -vv \
              tests/streamwise_app/test_streammovie.py

    - name: 'Run tests: StreamEdit'
      if: always()
      timeout-minutes: 10
      run: |
        export COVERAGE_FILE=.coverage.streamedit
        pytest --junitxml=test-results-streamedit.xml \
              --cov=. \
              --cov-report=term \
              --durations=10 \
              -vv \
              tests/streamwise_app/test_streamedit.py

    - name: 'Run tests: StreamChat'
      if: always()
      timeout-minutes: 10
      run: |
        export COVERAGE_FILE=.coverage.streamchat
        pytest --junitxml=test-results-streamchat.xml \
              --cov=. \
              --cov-report=term \
              --durations=10 \
              -vv \
              tests/streamwise_app/test_streamchat.py

    - name: 'Run tests: StreamLecture'
      if: always()
      timeout-minutes: 10
      run: |
        export COVERAGE_FILE=.coverage.streamlecture
        pytest --junitxml=test-results-streamlecture.xml \
              --cov=. \
              --cov-report=term \
              --durations=10 \
              -vv \
              tests/streamwise_app/test_streamlecture.py

    - name: 'Run tests: StreamAnimate'
      if: always()
      timeout-minutes: 10
      run: |
        export COVERAGE_FILE=.coverage.streamanimate
        pytest --junitxml=test-results-streamanimate.xml \
              --cov=. \
              --cov-report=term \
              --durations=10 \
              -vv \
              tests/streamwise_app/test_streamanimate.py

    - name: 'Run tests: StreamWise apps'
      if: always()
      timeout-minutes: 10
      run: |
        export COVERAGE_FILE=.coverage.streamwise_app
        pytest --junitxml=test-results-streamwise_app.xml \
              --cov=. \
              --cov-report=term \
              --durations=10 \
              -vv \
              --ignore=tests/streamwise_app/test_streamcast.py \
              --ignore=tests/streamwise_app/test_streampersona.py \
              --ignore=tests/streamwise_app/test_streamshort.py \
              --ignore=tests/streamwise_app/test_streamdub.py \
              --ignore=tests/streamwise_app/test_streammovie.py \
              --ignore=tests/streamwise_app/test_streamedit.py \
              --ignore=tests/streamwise_app/test_streamchat.py \
              --ignore=tests/streamwise_app/test_streamlecture.py \
              --ignore=tests/streamwise_app/test_streamanimate.py \
              tests/streamwise_app

    - name: 'Run tests: StreamWise'
      if: always()
      timeout-minutes: 10
      run: |
        export COVERAGE_FILE=.coverage.streamwise
        pytest --junitxml=test-results-streamwise.xml \
              --cov=. \
              --cov-report=term \
              --durations=10 \
              -vv \
              tests/streamwise/

    - name: Generate coverage reports
      if: always()
      run: |
        export COVERAGE_FILE=.coverage
        coverage combine --keep .coverage.*
        coverage xml -o coverage.xml --ignore-errors
        coverage html -d htmlcov --ignore-errors

    - name: Test artifacts summary
      if: always()
      run: |
        echo "## Test Artifacts" >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"
        echo "| File | Size |" >> "$GITHUB_STEP_SUMMARY"
        echo "|------|------|" >> "$GITHUB_STEP_SUMMARY"
        for f in test-results*.xml; do
          [ -f "$f" ] && echo "| $f | $(du -h "$f" | cut -f1) |" >> "$GITHUB_STEP_SUMMARY"
        done
        echo "| coverage.xml | $(du -h coverage.xml 2>/dev/null | cut -f1 || echo 'N/A') |" >> "$GITHUB_STEP_SUMMARY"

    - name: Publish test results
      if: always()
      uses: EnricoMi/publish-unit-test-result-action@v2
      with:
        files: test-results*.xml
        comment_mode: always
        job_summary: true

    - name: Upload XML coverage report
      if: always()
      uses: actions/upload-artifact@v6
      with:
        name: xml-coverage-report
        path: coverage.xml

    - name: Upload HTML coverage report
      if: always()
      uses: actions/upload-artifact@v6
      with:
        name: html-coverage-report
        path: htmlcov/

    - name: Upload Pages artifact
      if: always() && github.ref == 'refs/heads/main'
      uses: actions/upload-pages-artifact@v4
      with:
        path: htmlcov/

    - name: Code coverage summary
      id: coverage-summary
      if: always()
      uses: irongut/CodeCoverageSummary@v1.3.0
      with:
        filename: coverage.xml
        badge: true
        format: markdown
        output: both
        fail_below_min: false
        thresholds: '40 60'

    - name: Publish coverage to summary
      if: always()
      run: cat code-coverage-results.md >> "$GITHUB_STEP_SUMMARY"

    - name: Add coverage PR comment
      if: always() && github.event_name == 'pull_request'
      uses: marocchino/sticky-pull-request-comment@v2
      with:
        recreate: true
        message: |
          ${{ steps.coverage-summary.outputs.summary || '' }}
          :open_book: [Full HTML Coverage Report](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/) (updated on merge to main)
          :file_folder: [Download HTML Coverage Report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) — see *html-coverage-report* artifact
        path: code-coverage-results.md

  deploy-coverage:
    name: Deploy Coverage
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: Coverage Report
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4

  docker-imageresize:
    name: Docker imageresize
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build base image
      working-directory: deployment/base
      env:
        DOCKER_REPO: local
        BASE_IMAGE: ubuntu:24.04
        TORCH_PACKAGE: torch
        TORCH_INDEX_URL: https://download.pytorch.org/whl/cpu
      run: bash setup_image.sh

    - name: Build imageresize image
      working-directory: deployment/wrappers/imageresize
      env:
        DOCKER_REPO: local
      run: bash setup_image.sh

    - name: Start imageresize service
      run: |
        TAG=$(jq -r '.imageresize.dockerImage.tag' services.json)
        docker run -d -p 8080:8080 --name imageresize_ci "local/imageresize:${TAG}"

    - name: Wait for imageresize to be ready
      run: |
        for i in $(seq 1 30); do
          if curl -sf http://localhost:8080/health > /dev/null; then
            echo "Service is ready"
            break
          fi
          echo "Waiting... ($i/30)"
          sleep 2
        done

    - name: Test imageresize endpoint with curl
      run: |
        IMG_BASE64=$(base64 -w0 benchmark/samples/sample_256x192.png)
        curl -sf -X POST http://localhost:8080/imageresize \
          -H "Content-Type: application/json" \
          -d "{\"img\": \"$IMG_BASE64\", \"width\": 200, \"height\": 200}" \
          -o /dev/null
        echo "PASS: imageresize endpoint responded successfully"

    - name: Stop imageresize container
      if: always()
      run: docker stop imageresize_ci || true

  stats:
    name: Stats
    runs-on: ubuntu-latest
    if: always()

    steps:
    - uses: actions/checkout@v5

    - name: Install cloc
      run: |
        sudo apt-get update
        sudo apt-get install -y cloc
        cloc .

    - name: Generate cloc report (text)
      run: |
        cloc . \
          --exclude-dir=.git,venv,node_modules \
          --out=cloc-report.txt
        cat cloc-report.txt

    - name: Show lines of code
      run: cat cloc-report.txt

    - name: Upload cloc report (text)
      uses: actions/upload-artifact@v6
      with:
        name: cloc-text
        path: cloc-report.txt

    - name: Lines of code (Markdown)
      run: |
        cloc . \
          --exclude-dir=.git,venv,node_modules \
          --md \
          --out=cloc-summary.md
        cat cloc-summary.md

    - name: Show lines of code (Markdown)
      run: cat cloc-summary.md

    - name: Upload cloc report (Markdown)
      uses: actions/upload-artifact@v6
      with:
        name: cloc-markdown
        path: cloc-summary.md

    - name: Publish summary
      run: |
        set -e

        if [ ! -f cloc-summary.md ]; then
          echo "cloc-summary.md not found!"
          exit 1
        fi

        echo "# Lines of Code Report" > cloc-summary-wrapper.md
        echo "" >> cloc-summary-wrapper.md
        cat cloc-summary.md >> cloc-summary-wrapper.md

        cat cloc-summary-wrapper.md >> "$GITHUB_STEP_SUMMARY"
