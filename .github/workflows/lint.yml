name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: ['*']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Use Python 3.12
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install flake8 j2lint yamllint

    - name: Install shellcheck and jq
      run: |
        sudo apt-get update
        sudo apt-get install -y shellcheck jq
        sudo apt-get clean
        sudo rm -rf /var/lib/apt/lists/*

    - name: Install markdownlint-cli
      run: npm install -g markdownlint-cli

    - name: Install Bicep CLI
      run: az bicep install

    - name: Run Python lint
      if: always()
      run: flake8 . tests --output-file=flake8-results.txt --tee

    - name: Annotate flake8 results
      if: always()
      uses: reviewdog/action-setup@v1

    - name: Python reviewdog
      if: always()
      env:
        REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        cat flake8-results.txt | reviewdog -efm="%f:%l:%c: %m" -name="Python" -reporter=github-check -level=warning || true

    - name: Run shell lint
      if: always()
      run: |
        shellcheck -x -f gcc $(git ls-files '*.sh') $(git ls-files '*.bash') > shellcheck-results.txt 2>&1
        SC_EXIT=$?
        cat shellcheck-results.txt
        exit $SC_EXIT

    - name: Shell reviewdog
      if: always()
      env:
        REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        cat shellcheck-results.txt | reviewdog -efm="%f:%l:%c: %m" -name="Shell" -reporter=github-check -level=warning || true

    - name: Run HTML/Jinja lint
      if: always()
      run: |
        for dir in streamwise/templates apps/*/templates; do
          j2lint "$dir" --extensions html || true
        done

    - name: Run YAML lint
      if: always()
      run: |
        yamllint -c .yamllint.yml -f parsable $(git ls-files '*.yml' '*.yaml') > yamllint-results.txt 2>&1
        YAMLLINT_EXIT=$?
        cat yamllint-results.txt
        exit $YAMLLINT_EXIT

    - name: YAML reviewdog
      if: always()
      env:
        REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        cat yamllint-results.txt | reviewdog -efm="%f:%l:%c: %m" -name="YAML" -reporter=github-check -level=warning || true

    - name: Run JSON lint
      if: always()
      run: |
        EXIT=0
        > jsonlint-results.txt
        for f in $(git ls-files '*.json'); do
          if ! jq_out=$(jq empty "$f" 2>&1); then
            line=$(echo "$jq_out" | sed -n 's/.*line \([0-9]*\).*/\1/p' | head -1)
            col=$(echo "$jq_out" | sed -n 's/.*column \([0-9]*\).*/\1/p' | head -1)
            line=${line:-1}
            col=${col:-1}
            msg=$(echo "$jq_out" | head -1)
            echo "${f}:${line}:${col}: ${msg}" >> jsonlint-results.txt
            EXIT=1
          fi
        done
        if [ "$EXIT" -eq 0 ]; then
          echo "All JSON files are valid." > jsonlint-results.txt
        fi
        cat jsonlint-results.txt
        exit $EXIT

    - name: JSON reviewdog
      if: always()
      env:
        REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        cat jsonlint-results.txt | reviewdog -efm="%f:%l:%c: %m" -name="JSON" -reporter=github-check -level=error || true

    - name: Run Markdown lint
      if: always()
      run: |
        MD_FILES=$(git ls-files '*.md')
        if [ -z "$MD_FILES" ]; then
          touch markdownlint-results.txt
          exit 0
        fi
        markdownlint $MD_FILES > markdownlint-results.txt 2>&1
        MD_EXIT=$?
        cat markdownlint-results.txt
        exit $MD_EXIT

    - name: Markdown reviewdog
      if: always()
      env:
        REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        cat markdownlint-results.txt | reviewdog -efm="%f:%l:%c %m" -efm="%f:%l %m" -name="Markdown" -reporter=github-check -level=warning || true

    - name: Run Bicep lint
      if: always()
      run: |
        > biceplint-results.txt
        EXIT=0
        for f in $(git ls-files '*.bicep'); do
          if ! az bicep lint --file "$f" >> biceplint-results.txt 2>&1; then
            EXIT=1
          fi
        done
        cat biceplint-results.txt
        exit $EXIT

    - name: Bicep reviewdog
      if: always()
      env:
        REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        cat biceplint-results.txt | reviewdog -efm="%f(%l,%c) : %m" -name="Bicep" -reporter=github-check -level=warning || true

    - name: Lint summary
      if: always()
      run: |
        {
          echo "## Lint Results"
          echo ""
          echo "| Check | Status |"
          echo "|-------|--------|"
          if [ -s flake8-results.txt ]; then
            FLAKE8_COUNT=$(wc -l < flake8-results.txt)
            echo "| Python | :x: ${FLAKE8_COUNT} issue(s) |"
          else
            echo "| Python | :white_check_mark: |"
          fi
          if [ -s shellcheck-results.txt ]; then
            SC_COUNT=$(wc -l < shellcheck-results.txt)
            echo "| Shell | :x: ${SC_COUNT} issue(s) |"
          else
            echo "| Shell | :white_check_mark: |"
          fi
          if [ -s yamllint-results.txt ] && grep -q '\[error\]' yamllint-results.txt; then
            YL_COUNT=$(grep -c '\[error\]' yamllint-results.txt || true)
            echo "| YAML | :x: ${YL_COUNT} error(s) |"
          else
            echo "| YAML | :white_check_mark: |"
          fi
          if grep -q 'INVALID' jsonlint-results.txt 2>/dev/null; then
            echo "| JSON | :x: Invalid files found |"
          else
            echo "| JSON | :white_check_mark: |"
          fi
          if [ -s markdownlint-results.txt ]; then
            MD_COUNT=$(wc -l < markdownlint-results.txt)
            echo "| Markdown | :x: ${MD_COUNT} issue(s) |"
          else
            echo "| Markdown | :white_check_mark: |"
          fi
          if [ -s biceplint-results.txt ]; then
            BICEP_COUNT=$(wc -l < biceplint-results.txt)
            echo "| Bicep | :x: ${BICEP_COUNT} issue(s) |"
          else
            echo "| Bicep | :white_check_mark: |"
          fi
          echo ""
          if [ -s flake8-results.txt ]; then
            echo "**Python details:**"
            echo '```'
            head -20 flake8-results.txt
            echo '```'
          fi
          if [ -s shellcheck-results.txt ]; then
            echo "**Shell details:**"
            echo '```'
            head -20 shellcheck-results.txt
            echo '```'
          fi
          if [ -s yamllint-results.txt ] && grep -q '\[error\]' yamllint-results.txt; then
            echo "**YAML details:**"
            echo '```'
            head -20 yamllint-results.txt
            echo '```'
          fi
          if grep -q 'INVALID' jsonlint-results.txt 2>/dev/null; then
            echo "**JSON details:**"
            echo '```'
            cat jsonlint-results.txt
            echo '```'
          fi
          if [ -s markdownlint-results.txt ]; then
            echo "**Markdown details:**"
            echo '```'
            head -20 markdownlint-results.txt
            echo '```'
          fi
          if [ -s biceplint-results.txt ]; then
            echo "**Bicep details:**"
            echo '```'
            head -20 biceplint-results.txt
            echo '```'
          fi
        } | tee lint-summary.md >> "$GITHUB_STEP_SUMMARY"

    - name: Add lint PR comment
      if: always() && github.event_name == 'pull_request'
      uses: marocchino/sticky-pull-request-comment@v3
      with:
        header: lint
        recreate: true
        path: lint-summary.md
