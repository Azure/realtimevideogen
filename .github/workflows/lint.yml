name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: ['*']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5

    - name: Use Python 3.12
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install flake8 j2lint yamllint

    - name: Install shellcheck and jq
      run: |
        sudo apt-get update
        sudo apt-get install -y shellcheck jq
        sudo apt-get clean
        sudo rm -rf /var/lib/apt/lists/*

    - name: Run Python lint
      if: always()
      run: flake8 . tests --output-file=flake8-results.txt --tee

    - name: Annotate flake8 results
      if: always()
      uses: reviewdog/action-setup@v1

    - name: Flake8 reviewdog
      if: always()
      env:
        REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        cat flake8-results.txt | reviewdog -efm="%f:%l:%c: %m" -name="flake8" -reporter=github-check -level=warning || true

    - name: Run shell lint
      if: always()
      run: |
        shellcheck -x -f gcc $(git ls-files '*.sh') $(git ls-files '*.bash') > shellcheck-results.txt 2>&1
        SC_EXIT=$?
        cat shellcheck-results.txt
        exit $SC_EXIT

    - name: Shellcheck reviewdog
      if: always()
      env:
        REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        cat shellcheck-results.txt | reviewdog -efm="%f:%l:%c: %m" -name="shellcheck" -reporter=github-check -level=warning || true

    - name: Run HTML/Jinja lint
      if: always()
      run: |
        for dir in streamwise/templates apps/*/templates; do
          j2lint "$dir" --extensions html || true
        done

    - name: Run YAML lint
      if: always()
      run: |
        yamllint -c .yamllint.yml $(git ls-files '*.yml' '*.yaml') > yamllint-results.txt 2>&1
        YAMLLINT_EXIT=$?
        cat yamllint-results.txt
        exit $YAMLLINT_EXIT

    - name: Run JSON lint
      if: always()
      run: |
        EXIT=0
        for f in $(git ls-files '*.json'); do
          if ! jq empty "$f" > /dev/null 2>&1; then
            echo "INVALID: $f" >> jsonlint-results.txt
            EXIT=1
          fi
        done
        if [ "$EXIT" -eq 0 ]; then
          echo "All JSON files are valid." > jsonlint-results.txt
        fi
        cat jsonlint-results.txt
        exit $EXIT

    - name: Lint summary
      if: always()
      run: |
        echo "## Lint Results" >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"
        if [ -s flake8-results.txt ]; then
          FLAKE8_COUNT=$(wc -l < flake8-results.txt)
          echo "**flake8:** ${FLAKE8_COUNT} issue(s)" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          head -20 flake8-results.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
        else
          echo "**flake8:** No issues found :white_check_mark:" >> "$GITHUB_STEP_SUMMARY"
        fi
        echo "" >> "$GITHUB_STEP_SUMMARY"
        if [ -s shellcheck-results.txt ]; then
          SC_COUNT=$(wc -l < shellcheck-results.txt)
          echo "**shellcheck:** ${SC_COUNT} issue(s)" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          head -20 shellcheck-results.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
        else
          echo "**shellcheck:** No issues found :white_check_mark:" >> "$GITHUB_STEP_SUMMARY"
        fi
        echo "" >> "$GITHUB_STEP_SUMMARY"
        if [ -s yamllint-results.txt ] && grep -q '\[error\]' yamllint-results.txt; then
          YL_COUNT=$(grep -c '\[error\]' yamllint-results.txt || true)
          echo "**yamllint:** ${YL_COUNT} error(s)" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          head -20 yamllint-results.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
        else
          echo "**yamllint:** No errors found :white_check_mark:" >> "$GITHUB_STEP_SUMMARY"
        fi
        echo "" >> "$GITHUB_STEP_SUMMARY"
        if grep -q 'INVALID' jsonlint-results.txt 2>/dev/null; then
          echo "**jsonlint:** Invalid JSON files found" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat jsonlint-results.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
        else
          echo "**jsonlint:** No issues found :white_check_mark:" >> "$GITHUB_STEP_SUMMARY"
        fi
