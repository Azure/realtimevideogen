name: Docker

on:
  workflow_dispatch:
  pull_request:
    paths:
    - 'deployment/base/**'
    - 'deployment/wrappers/**'
    - 'deployment/apps/**'
    - 'deployment/streamwise/**'
    - 'wrapper/**'
    - 'apps/**'
    - 'streamwise/**'
    - 'services.json'
    - '.github/workflows/docker.yml'
  schedule:
  - cron: '0 3 * * *'  # Daily at 03:00 UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  docker:
    name: Docker
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
    - uses: actions/checkout@v5

    - name: Free disk space
      run: |
        df -h
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL \
                    /usr/local/share/boost /usr/share/swift /usr/local/.ghcup \
                    /usr/local/share/powershell /usr/share/rust
        sudo apt-get clean
        docker system prune -af
        df -h

    - name: Start local Docker registry
      run: docker run -d -p 5000:5000 --name registry registry:2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4
      with:
        driver-opts: network=host

    - name: Build base image
      working-directory: deployment/base
      env:
        DOCKER_REPO: localhost:5000
        BASE_IMAGE: ubuntu:24.04
        TORCH_PACKAGE: torch
        TORCH_INDEX_URL: https://download.pytorch.org/whl/cpu
      run: |
        bash setup_image.sh
        BASE_TAG=$(jq -r '.base.dockerImage.tag' ../../services.json)
        docker push "localhost:5000/base:${BASE_TAG}"

    - name: Build imageresize image
      working-directory: deployment/wrappers/imageresize
      env:
        DOCKER_REPO: localhost:5000
      run: bash setup_image.sh

    - name: Start imageresize service
      run: |
        TAG=$(jq -r '.imageresize.dockerImage.tag' services.json)
        docker run -d -p 8080:8080 --name imageresize_ci "imageresize:${TAG}"

    - name: Wait for imageresize to be ready
      run: |
        for i in $(seq 1 30); do
          if curl -sf http://localhost:8080/health > /dev/null; then
            echo "Service is ready"
            exit 0
          fi
          echo "Waiting... ($i/30)"
          sleep 2
        done
        echo "Service did not become ready in time" >&2
        exit 1

    - name: Test imageresize endpoint with curl
      run: |
        IMG_BASE64=$(base64 -w0 benchmark/samples/sample_256x192.png)
        curl -sf -X POST http://localhost:8080/imageresize \
          -H "Content-Type: application/json" \
          -d "{\"img\": \"$IMG_BASE64\", \"width\": 200, \"height\": 200}" \
          -o test_image.png
        if [ ! -s test_image.png ]; then
          echo "❌ Image file is empty or missing" >&2
          exit 1
        fi
        echo "✅ PASS: imageresize endpoint responded successfully"
        mediainfo test_image.png

    - name: Clean up imageresize
      run: |
        docker stop imageresize_ci || true
        TAG=$(jq -r '.imageresize.dockerImage.tag' services.json)
        docker rmi "imageresize:${TAG}" || true
        docker buildx prune -af
        df -h

    - name: Build kokoro image
      working-directory: deployment/wrappers/kokoro
      env:
        DOCKER_REPO: localhost:5000
        EXTRA_BUILD_ARGS: --build-arg INSTALL_FLASH_ATTN=0
      run: bash setup_image.sh

    - name: Start kokoro service
      run: |
        KOKORO_TAG=$(jq -r '.kokoro.dockerImage.tag' services.json)
        docker run -d -p 8080:8080 --name kokoro_ci "kokoro:${KOKORO_TAG}"

    - name: Wait for kokoro to be ready
      # The HTTP server starts before model init, so we poll for status=ok rather
      # than a bare HTTP 200. Kokoro-82M (~300 MB) downloads from HuggingFace on
      # first start; allow up to 5 minutes (30 × 10 s).
      run: |
        for attempt in $(seq 1 30); do
          STATUS=$(curl -sf http://localhost:8080/health 2>/dev/null \
            | jq -r '.kokoro.status // empty' 2>/dev/null)
          if [ "$STATUS" = "ok" ]; then
            echo "✅ Kokoro is ready"
            exit 0
          fi
          echo "Waiting... ($attempt/30) status=${STATUS:-loading}"
          sleep 10
        done
        echo "Kokoro did not become ready in time" >&2
        docker logs kokoro_ci >&2
        exit 1

    - name: Generate audio with kokoro (TTS)
      run: |
        TS=$(date -u '+%Y-%m-%d %H:%M UTC')
        curl -sf -X POST http://localhost:8080/kokoro \
          -H "Content-Type: application/json" \
          -d "{\"text\": \"Hello world. The current date and time is ${TS}.\"}" \
          -o test_audio.wav
        if [ ! -s test_audio.wav ]; then
          echo "❌ Audio file is empty or missing" >&2
          exit 1
        fi
        if ! file test_audio.wav | grep -qi "WAVE"; then
          echo "❌ Response is not a WAV file" >&2
          mediainfo test_audio.wav >&2
          exit 1
        fi
        echo "✅ PASS: kokoro generated $(wc -c < test_audio.wav) bytes of audio"
        mediainfo test_audio.wav

    - name: Upload audio artifact
      if: always()
      uses: actions/upload-artifact@v6
      with:
        name: kokoro-test-audio
        path: test_audio.wav

    - name: Stop kokoro container
      if: always()
      run: docker stop kokoro_ci || true

    - name: Clean up kokoro
      run: |
        KOKORO_TAG=$(jq -r '.kokoro.dockerImage.tag' services.json)
        docker rmi "kokoro:${KOKORO_TAG}" || true
        docker buildx prune -af
        df -h

    - name: Build streamcast image
      working-directory: deployment/apps/streamcast
      env:
        DOCKER_REPO: localhost:5000
      run: bash setup_image.sh

    - name: Start streamcast service
      run: |
        TAG=$(jq -r '.streamcast.dockerImage.tag' services.json)
        docker run -d -p 18080:18080 --name streamcast_ci "streamcast:${TAG}"

    - name: Wait for streamcast to be ready
      run: |
        for i in $(seq 1 30); do
          STATUS=$(curl -sf http://localhost:18080/health 2>/dev/null \
            | jq -r '.status // empty' 2>/dev/null)
          if [ "$STATUS" = "ok" ]; then
            echo "✅ StreamCast is ready"
            exit 0
          fi
          echo "Waiting... ($i/30) status=${STATUS:-loading}"
          sleep 2
        done
        echo "StreamCast did not become ready in time" >&2
        docker logs streamcast_ci >&2
        exit 1

    - name: Download streamcast pages
      run: |
        mkdir -p streamcast_pages
        curl -sf http://localhost:18080/ -o streamcast_pages/index.html
        curl -sf http://localhost:18080/job -o streamcast_pages/submit_job.html
        echo "✅ Downloaded StreamCast pages"

    - name: Upload streamcast pages artifact
      if: always()
      uses: actions/upload-artifact@v6
      with:
        name: streamcast-pages
        path: streamcast_pages/

    - name: Stop streamcast container
      if: always()
      run: docker stop streamcast_ci || true

    - name: Clean up streamcast
      run: |
        TAG=$(jq -r '.streamcast.dockerImage.tag' services.json)
        docker rmi "streamcast:${TAG}" || true
        docker buildx prune -af
        df -h

    - name: Build streamwise image
      working-directory: deployment/streamwise
      env:
        DOCKER_REPO: localhost:5000
      run: bash setup_image.sh

    - name: Start streamwise service
      run: |
        TAG=$(jq -r '.streamwise.dockerImage.tag' services.json)
        docker run -d -p 18181:18181 --name streamwise_ci "streamwise:${TAG}"

    - name: Wait for streamwise to be ready
      run: |
        for i in $(seq 1 30); do
          STATUS=$(curl -sf http://localhost:18181/health 2>/dev/null \
            | jq -r '.status // empty' 2>/dev/null)
          if [ "$STATUS" = "ok" ]; then
            echo "✅ StreamWise is ready"
            exit 0
          fi
          echo "Waiting... ($i/30) status=${STATUS:-loading}"
          sleep 2
        done
        echo "StreamWise did not become ready in time" >&2
        docker logs streamwise_ci >&2
        exit 1

    - name: Download streamwise pages
      run: |
        mkdir -p streamwise_pages
        curl -sf http://localhost:18181/ -o streamwise_pages/index.html
        echo "✅ Downloaded StreamWise pages"

    - name: Upload streamwise pages artifact
      if: always()
      uses: actions/upload-artifact@v6
      with:
        name: streamwise-pages
        path: streamwise_pages/

    - name: Stop streamwise container
      if: always()
      run: docker stop streamwise_ci || true
