apiVersion: v1
kind: Pod
metadata:
  name: streamcast
  namespace: rtgen
  labels:
    app: streamcast
spec:
  containers:
  - name: streamcast
    image: ${ACR_URL}/streamcast:v0.5.0
    ports:
    - containerPort: 18080
      protocol: TCP
    env:
    - name: HUGGING_FACE_HUB_TOKEN
      valueFrom:
        secretKeyRef:
          name: hf-token
          key: token
    - name: NVIDIA_VISIBLE_DEVICES
      value: none
    resources:
      requests:
        cpu: "2"
        memory: "4Gi"
        ephemeral-storage: "16Gi"
      limits:
        cpu: "4"
        memory: "8Gi"
        ephemeral-storage: "32Gi"
    # TLS certificate mounted from the Kubernetes TLS secret "streamwise-tls-secret".
    # The secret is populated by cert-manager (CA-signed, recommended) or by
    # manually running: kubectl create secret tls streamwise-tls-secret -n rtgen
    #                     --cert=cert.pem --key=key.pem
    # run_httpserver.bash auto-detects /certs/tls.crt and /certs/tls.key
    # and enables HTTPS automatically.
    # See deployment/k8s/certs.md for the full setup guide.
    volumeMounts:
    - name: tls-cert
      mountPath: /certs
      readOnly: true
  volumes:
  - name: tls-cert
    secret:
      secretName: streamwise-tls-secret
      optional: true
      items:
      - key: tls.crt
        path: tls.crt
      - key: tls.key
        path: tls.key
  imagePullSecrets:
  - name: acr-secret
  nodeSelector:
    kubernetes.io/os: linux
    kubernetes.io/arch: amd64
  affinity: {}
  tolerations: []
  serviceAccountName: streamwiseapp-service-account

---
apiVersion: v1
kind: Service
metadata:
  name: streamcast-svc
  namespace: rtgen
  annotations:
    service.beta.kubernetes.io/azure-load-balancer-resource-group: ${RESOURCE_GROUP_NAME}
spec:
  type: LoadBalancer
  loadBalancerIP: ${LOAD_BALANCER_IP}
  selector:
    app: streamcast
  ports:
  - port: 8080
    targetPort: 18080
    protocol: TCP
