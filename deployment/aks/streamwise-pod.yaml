apiVersion: v1
kind: Pod
metadata:
  name: streamwise
  namespace: rtgen
  labels:
    app: streamwise
spec:
  containers:
  - name: streamwise
    image: ${ACR_URL}/streamwise:v0.5.0
    ports:
    - containerPort: 18181
      protocol: TCP
    env:
    - name: HUGGING_FACE_HUB_TOKEN
      valueFrom:
        secretKeyRef:
          name: hf-token
          key: token
    - name: NVIDIA_VISIBLE_DEVICES
      value: none
    - name: LB_RESOURCE_GROUP
      value: ${RESOURCE_GROUP_NAME}
    - name: LB_IP_ADDRESS
      value: ${LOAD_BALANCER_IP}
    resources:
      requests:
        cpu: "2"
        memory: "4Gi"
        ephemeral-storage: "16Gi"
      limits:
        cpu: "4"
        memory: "8Gi"
        ephemeral-storage: "32Gi"
    # TLS certificate from Azure Key Vault via Secrets Store CSI Driver.
    # The run_httpserver.bash entrypoint auto-detects /certs/tls.crt and
    # /certs/tls.key and enables HTTPS automatically.
    # Requires: deployment/k8s/tls-secret-provider.yaml applied first.
    volumeMounts:
    - name: tls-csi
      mountPath: /certs
      readOnly: true
  volumes:
  - name: tls-csi
    csi:
      driver: secrets-store.csi.k8s.io
      readOnly: true
      volumeAttributes:
        secretProviderClass: streamwise-tls
  imagePullSecrets:
  - name: acr-secret
  nodeSelector:
    kubernetes.io/os: linux
    kubernetes.io/arch: amd64
  affinity: {}
  tolerations: []
  serviceAccountName: streamwise-service-account

---
apiVersion: v1
kind: Service
metadata:
  name: streamwise-svc
  namespace: rtgen
  annotations:
    service.beta.kubernetes.io/azure-load-balancer-resource-group: ${RESOURCE_GROUP_NAME}
spec:
  type: LoadBalancer
  loadBalancerIP: ${LOAD_BALANCER_IP}
  selector:
    app: streamwise
  ports:
  - port: 8081
    targetPort: 18181
    protocol: TCP
