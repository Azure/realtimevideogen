apiVersion: v1
kind: Pod
metadata:
  name: streamwise
  namespace: rtgen
  labels:
    app: streamwise
spec:
  containers:
  - name: streamwise
    image: ${ACR_URL}/streamwise:v0.4.0
    ports:
    - containerPort: 18181
      protocol: TCP
    env:
    - name: HUGGING_FACE_HUB_TOKEN
      valueFrom:
        secretKeyRef:
          name: hf-token
          key: token
    - name: NVIDIA_VISIBLE_DEVICES
      value: none
    - name: LB_RESOURCE_GROUP
      value: ${RESOURCE_GROUP_NAME}
    - name: LB_IP_ADDRESS
      value: ${LOAD_BALANCER_IP}
    resources:
      requests:
        cpu: "2"
        memory: "4Gi"
        ephemeral-storage: "16Gi"
      limits:
        cpu: "4"
        memory: "8Gi"
        ephemeral-storage: "32Gi"
    # HTTPS (optional): uncomment volumeMounts below and create a TLS Secret:
    #   kubectl create secret tls tls-secret -n rtgen --cert=cert.pem --key=key.pem
    # volumeMounts:
    # - name: tls-secret
    #   mountPath: /certs
    #   readOnly: true
  # volumes:
  # - name: tls-secret
  #   secret:
  #     secretName: tls-secret
  imagePullSecrets:
  - name: acr-secret
  nodeSelector:
    kubernetes.io/os: linux
    kubernetes.io/arch: amd64
  affinity: {}
  tolerations: []
  serviceAccountName: streamwise-service-account

---
apiVersion: v1
kind: Service
metadata:
  name: streamwise-svc
  namespace: rtgen
  annotations:
    service.beta.kubernetes.io/azure-load-balancer-resource-group: ${RESOURCE_GROUP_NAME}
spec:
  type: LoadBalancer
  loadBalancerIP: ${LOAD_BALANCER_IP}
  selector:
    app: streamwise
  ports:
  - port: 8081
    targetPort: 18181
    protocol: TCP
