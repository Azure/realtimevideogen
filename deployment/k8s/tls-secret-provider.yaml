# SecretProviderClass – mounts the TLS certificate from Azure Key Vault into
# the rtgen namespace and syncs it as a Kubernetes TLS Secret.
#
# The Secrets Store CSI Driver (enabled via the azureKeyvaultSecretsProvider
# AKS addon) fetches the certificate from Key Vault each time a pod using this
# volume starts.  It also creates/rotates the K8s Secret named "tls-secret"
# so that the certificate is available even before pods start.
#
# Prerequisites
# -------------
# 1. AKS cluster deployed with aks.bicep (provisions Key Vault, certificate,
#    CSI addon with OIDC issuer + workload identity, and required RBAC role assignments on the addon identity).
# 2. Retrieve the deployment outputs (run once after az deployment group create):
#
#    KEY_VAULT_NAME=$(az deployment group show \
#      --name AKSDeployment --resource-group $AZ_RESOURCE_GROUP \
#      --query properties.outputs.keyVaultName.value -o tsv)
#
#    CSI_ADDON_CLIENT_ID=$(az deployment group show \
#      --name AKSDeployment --resource-group $AZ_RESOURCE_GROUP \
#      --query properties.outputs.csiAddonClientId.value -o tsv)
#
#    AZ_TENANT_ID=$(az deployment group show \
#      --name AKSDeployment --resource-group $AZ_RESOURCE_GROUP \
#      --query properties.outputs.tenantId.value -o tsv)
#
#    TLS_CERT_NAME=$(az deployment group show \
#      --name AKSDeployment --resource-group $AZ_RESOURCE_GROUP \
#      --query properties.outputs.tlsCertificateName.value -o tsv)
#
# 3. Wait for the certificate to finish generating in Key Vault:
#
#    az keyvault certificate show \
#      --vault-name $KEY_VAULT_NAME --name $TLS_CERT_NAME \
#      --query attributes.enabled -o tsv
#    # should return "true"
#
# 4. Apply this manifest:
#
#    envsubst < deployment/k8s/tls-secret-provider.yaml | kubectl apply -f -
# --------------------------------------------------------------------------
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: streamwise-tls
  namespace: rtgen
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    # clientID: CSI addon managed identity client ID (from Bicep output csiAddonClientId).
    # The azureKeyvaultSecretsProvider addon creates its own user-assigned managed identity;
    # OIDC issuer and workload identity (both enabled by aks.bicep) allow the CSI driver to
    # authenticate to Key Vault using this identity via the clientID field.
    clientID: "${CSI_ADDON_CLIENT_ID}"
    keyvaultName: "${KEY_VAULT_NAME}"
    # objectType "secret" retrieves the PEM bundle (private key + certificate).
    # objectType "cert"   retrieves only the public certificate.
    objects: |
      array:
        - |
          objectName: ${TLS_CERT_NAME}
          objectType: secret
          objectAlias: tls.key
        - |
          objectName: ${TLS_CERT_NAME}
          objectType: cert
          objectAlias: tls.crt
    tenantId: "${AZ_TENANT_ID}"
  # Sync the certificate as a Kubernetes TLS Secret so it is available to
  # pods that mount it via volumeMounts (see streamwise-pod.yaml).
  secretObjects:
    - secretName: streamwise-tls-secret
      type: kubernetes.io/tls
      data:
        - objectName: tls.crt
          key: tls.crt
        - objectName: tls.key
          key: tls.key
