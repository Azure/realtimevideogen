# cert-manager ClusterIssuers for Let's Encrypt.
#
# Prerequisites:
#   1. Install cert-manager (once per cluster):
#        kubectl apply -f https://github.com/cert-manager/cert-manager/releases/latest/download/cert-manager.yaml
#        kubectl wait --namespace cert-manager \
#          --for=condition=ready pod --selector=app.kubernetes.io/instance=cert-manager \
#          --timeout=120s
#
#   2. Install the nginx-ingress controller bound to the static public IP:
#        helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
#        helm install ingress-nginx ingress-nginx/ingress-nginx \
#          --namespace ingress-nginx --create-namespace \
#          --set controller.service.loadBalancerIP=$LOAD_BALANCER_IP \
#          --set controller.service.annotations."service\.beta\.kubernetes\.io/azure-load-balancer-resource-group"=$RESOURCE_GROUP_NAME \
#          --set controller.service.externalTrafficPolicy=Local
#
#   3. Set LETSENCRYPT_EMAIL to a valid, monitored email address for expiry
#      notifications and account recovery (use a shared team mailbox):
#        export LETSENCRYPT_EMAIL=your@email.com
#
#   4. Apply this file:
#        envsubst < deployment/k8s/cert-manager-issuer.yaml | kubectl apply -f -
#
# Two issuers are provided:
#   - letsencrypt-staging : use during initial setup to avoid rate limits
#   - letsencrypt-prod    : use for the final, browser-trusted certificate
#
# The HTTP-01 solver uses the nginx Ingress controller to serve the ACME
# validation challenge on port 80.  The ingress controller must be bound to
# the same static public IP that the DNS label resolves to.
# Port 80 must be reachable from the Internet (the Bicep NSG already allows
# this via the AllowAcmeHttp01Inbound rule).
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: ${LETSENCRYPT_EMAIL}
    privateKeySecretRef:
      name: letsencrypt-staging-account-key
    solvers:
    - http01:
        ingress:
          ingressClassName: nginx
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: ${LETSENCRYPT_EMAIL}
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
    - http01:
        ingress:
          ingressClassName: nginx
