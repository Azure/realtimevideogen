apiVersion: apps/v1
kind: Deployment
metadata:
  name: wan
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gpu
  template:
    metadata:
      labels:
        app: wan
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: gpu-type
                operator: In
                values:
                - a100
                - h100
      containers:
      - name: wan
        image: abcd-xyz.azurecr.io/wan
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: wan
spec:
  type: NodePort
  selector:
    app: wan
  ports:
    - port: 80
      targetPort: 8080
      nodePort: 30080