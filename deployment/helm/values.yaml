    repository: vllm-librosa
    tag: XXXX

services:
  # --- CPU / lightweight services ---
  # Keep in sync with api_add_service() in streamwise/streamwise.py
  podcasttranscript:
    gpu: 0
    cpu: 1
    memory: 4Gi
    ephemeralStorage: 16Gi
  slidetranscript:
    gpu: 0
    cpu: 1
    memory: 4Gi
    ephemeralStorage: 16Gi
  imageresize:
    gpu: 0
    cpu: 2
    memory: 8Gi
    ephemeralStorage: 16Gi
  yolo:
    gpu: 1
    cpu: 4
    memory: 8Gi
    ephemeralStorage: 16Gi
    mig_profile: 1g.10gb

  # --- Text-to-audio ---
  kokoro:
    gpu: 1
    cpu: 2
    memory: 8Gi
    ephemeralStorage: 16Gi
    mig_profile: 1g.10gb

  # --- Text-to-image / image editing ---
  flux:
    gpu: 2
    cpu: 12
    memory: 128Gi
    ephemeralStorage: 64Gi
  fluxkontext:
    gpu: 1
    cpu: 12
    memory: 128Gi
    ephemeralStorage: 64Gi
  hidream:
    gpu: 1
    cpu: 16
    memory: 192Gi
    ephemeralStorage: 96Gi
  bagel:
    gpu: 1
    cpu: 8
    memory: 192Gi
    ephemeralStorage: 64Gi
  realesrgan:
    gpu: 1
    cpu: 4
    memory: 32Gi
    ephemeralStorage: 16Gi

  # --- Text/image-to-video ---
  hunyuanframepack:
    gpu: 2
    cpu: 24
    memory: 192Gi
    ephemeralStorage: 64Gi
  hunyuanframepackf1:
    gpu: 2
    cpu: 24
    memory: 128Gi
    ephemeralStorage: 64Gi
  hunyuanframepackvae:
    gpu: 1
    cpu: 4
    memory: 32Gi
    ephemeralStorage: 16Gi
  hunyuanavatar:
    gpu: 2
    cpu: 24
    memory: 192Gi
    ephemeralStorage: 64Gi
  wan:
    gpu: 1
    cpu: 16
    memory: 192Gi
    ephemeralStorage: 16Gi
  fantasytalking:
    gpu: 2
    cpu: 12
    memory: 192Gi
    ephemeralStorage: 64Gi

  # --- vLLM-based services ---
  # Served via OpenAI-compatible API on port 8000
  gemma:
    gpu: 4
    cpu: 16
    memory: 192Gi
    ephemeralStorage: 64Gi
    tensorParallel: 2
    model: google/gemma-3-27b-it
    guidedBackend: xgrammar
  llama32:
    gpu: 2
    cpu: 16
    memory: 192Gi
    ephemeralStorage: 128Gi
    tensorParallel: 2
    model: meta-llama/Llama-3.2-90B-Vision
    guidedBackend: xgrammar
  # Whisper uses the vllm-librosa image (vllm/vllm-openai + librosa).
  # Served via /v1/audio/transcriptions on port 8000.
  whisper:
    gpu: 1
    cpu: 2
    memory: 8Gi
    ephemeralStorage: 16Gi
    model: openai/whisper-large-v3

hfTokenSecret: hf-token
hfHomeVolume: huggingface-cache
hfCacheStorage: 10Gi
